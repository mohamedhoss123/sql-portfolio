<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated JS Logo</title>

<style>
    *, *::before, *::after {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        overflow: hidden;
    }

    .logo-container {
        animation: scaleIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: scale(0.8);
    }

    .logo {
        width: 90vw;
        max-width: 400px; 
        /* Yellow JS drop shadow */
        filter: drop-shadow(0 0 20px rgba(240, 219, 79, 0.15)) 
                drop-shadow(0 10px 15px rgba(0, 0, 0, 0.3));
        transition: filter 0.3s ease, transform 0.3s ease;
    }

    .logo:hover {
        filter: drop-shadow(0 0 30px rgba(240, 219, 79, 0.3)) 
                drop-shadow(0 10px 15px rgba(0, 0, 0, 0.4));
        transform: translateY(-5px);
    }

    .logo path {
        fill: transparent;
        /* Draw both paths in JS yellow so they pop against the dark background */
        stroke: #f0db4f;
        stroke-width: 10; /* Thicker stroke because viewBox is 1052x1052 */
        stroke-linecap: round;
        stroke-linejoin: round;

        stroke-dasharray: var(--length);
        stroke-dashoffset: var(--length);

        animation:
            draw 4s cubic-bezier(0.25, 0.1, 0.25, 1) forwards,
            fillLogo 1.2s cubic-bezier(0.25, 0.1, 0.25, 1) forwards 3.5s;
    }

    /* Target the first path (the background square) */
    .logo path:nth-child(1) {
        --final-fill: #f0db4f; /* Fill yellow */
    }

    /* Target the second path (the JS text) */
    .logo path:nth-child(2) {
        --final-fill: #323330; /* Fill dark grey */
    }

    /* --- Keyframes --- */
    
    @keyframes scaleIn {
        to {
            opacity: 1;
            transform: scale(1);
        }
    }

    @keyframes draw {
        0% {
            stroke-dashoffset: var(--length);
            opacity: 0; 
        }
        5% {
            opacity: 1;
        }
        100% {
            stroke-dashoffset: 0;
            opacity: 1;
        }
    }

    @keyframes fillLogo {
        0% {
            fill: transparent;
        }
        100% {
            fill: var(--final-fill);
            stroke-width: 0;
        }
    }
</style>
</head>
<body>

<div class="logo-container">
    <svg class="logo" viewBox="0 0 1052 1052" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 0h1052v1052H0z"/>
        <path d="M965.9 801.1c-7.7-48-39-88.3-131.7-125.9-32.2-14.8-68.1-25.399-78.8-49.8-3.8-14.2-4.3-22.2-1.9-30.8 6.9-27.9 40.2-36.6 66.6-28.6 17 5.7 33.1 18.801 42.8 39.7 45.4-29.399 45.3-29.2 77-49.399-11.6-18-17.8-26.301-25.4-34-27.3-30.5-64.5-46.2-124-45-10.3 1.3-20.699 2.699-31 4-29.699 7.5-58 23.1-74.6 44-49.8 56.5-35.6 155.399 25 196.1 59.7 44.8 147.4 55 158.6 96.9 10.9 51.3-37.699 67.899-86 62-35.6-7.4-55.399-25.5-76.8-58.4-39.399 22.8-39.399 22.8-79.899 46.1 9.6 21 19.699 30.5 35.8 48.7 76.2 77.3 266.899 73.5 301.1-43.5 1.399-4.001 10.6-30.801 3.199-72.101zm-394-317.6h-98.4c0 85-.399 169.4-.399 254.4 0 54.1 2.8 103.7-6 118.9-14.4 29.899-51.7 26.2-68.7 20.399-17.3-8.5-26.1-20.6-36.3-37.699-2.8-4.9-4.9-8.7-5.601-9-26.699 16.3-53.3 32.699-80 49 13.301 27.3 32.9 51 58 66.399 37.5 22.5 87.9 29.4 140.601 17.3 34.3-10 63.899-30.699 79.399-62.199 22.4-41.3 17.6-91.3 17.4-146.6.5-90.2 0-180.4 0-270.9z"/>
    </svg>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // querySelectorAll grabs ALL paths in the SVG
        const paths = document.querySelectorAll(".logo path");
        
        paths.forEach(path => {
            const length = path.getTotalLength();
            // Apply length to each specific path individually
            path.style.setProperty("--length", length + 1);
        });
    });
</script>

</body>
</html>
